
# ─────────────────────────────────────────────────────────────
# CAPABILITY TAXONOMY — 18 capabilities across 4 categories
# Each capability defines signals across all 6 evidence channels.
# ─────────────────────────────────────────────────────────────

[negative_signals]
keywords = ["leetcode", "adventofcode", "advent-of-code", "competitive", "competitive-programming", "hackerrank", "interview-prep"]

# ═══════════════════════════════
# CATEGORY 1 — SYSTEMS & LOW-LEVEL
# ═══════════════════════════════

[[capabilities]]
id = "DistributedAlgorithms"
display_name = "Distributed Algorithms"
meta_category = "Systems"
keywords = { strict = ["raft", "paxos", "consensus", "crdt", "gossip"], soft = ["distributed", "cluster", "leader election", "quorum", "shard", "replicated"] }
core_dependencies = ["raft", "raft-rs", "hashicorp/raft", "zookeeper"]
ecosystem_dependencies = ["consul", "etcd-client"]
file_tokens = ["raft", "paxos", "quorum", "gossip", "crdt"]
folders = ["consensus", "raft", "quorum"]
language_hints = ["Go", "Rust", "Java", "C++"]

[[capabilities]]
id = "ConcurrentProgramming"
display_name = "Concurrent Programming"
meta_category = "Systems"
keywords = { strict = ["tokio", "rayon", "crossbeam", "lock-free", "actor"], soft = ["async", "await", "mutex", "rwlock", "parallel", "concurrent"] }
core_dependencies = ["tokio", "rayon", "crossbeam", "smol", "flume", "parking_lot"]
ecosystem_dependencies = ["futures", "actix", "erlang"]
file_tokens = ["scheduler", "executor", "threadpool", "rwlock", "actor"]
folders = ["executors", "workers"]
language_hints = ["Rust", "Go", "Erlang", "Scala"]

[[capabilities]]
id = "RuntimeSystems"
display_name = "Runtime Systems"
meta_category = "Systems"
keywords = { strict = ["bytecode", "garbage collection", "memory allocator", "wasm runtime", "v8", "jit"], soft = ["interpreter", "vm", "allocator", "heap", "pointer"] }
